name: Sync Add-ons

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      addon:
        description: 'Add-on slug to sync (leave empty for all)'
        required: false
        default: ''
      force:
        description: 'Force rebuild even if version has not changed'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout collection
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # prompts – https://github.com/pajew-ski/prompts
      # -----------------------------------------------------------------------
      - name: Check prompts for updates
        id: prompts
        if: ${{ github.event.inputs.addon == '' || github.event.inputs.addon == 'prompts' }}
        run: |
          UPSTREAM_VERSION=$(curl -sf \
            https://raw.githubusercontent.com/pajew-ski/prompts/main/config.yaml \
            | grep '^version:' | awk '{print $2}' | tr -d '"')

          CURRENT_VERSION=$(grep '^version:' prompts/config.yaml \
            | awk '{print $2}' | tr -d '"')

          echo "upstream=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT_VERSION"   >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_VERSION" != "$CURRENT_VERSION" ] \
             || [ "${{ inputs.force }}" = "true" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed: $CURRENT_VERSION → $UPSTREAM_VERSION"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Already up-to-date at $CURRENT_VERSION"
          fi

      - name: Sync prompts config files
        if: steps.prompts.outputs.needs_update == 'true'
        run: |
          BASE_URL="https://raw.githubusercontent.com/pajew-ski/prompts/main"

          # Always sync build.yaml (strip unsupported archs)
          curl -sf "$BASE_URL/build.yaml" -o prompts/build.yaml
          sed -i '/^\s*armhf:/d; /^\s*i386:/d' prompts/build.yaml

          # Sync upstream config.yaml and inject image reference
          UPSTREAM_CONFIG=$(curl -sf "$BASE_URL/config.yaml")
          echo "$UPSTREAM_CONFIG" > prompts/config.yaml

          # Strip unsupported architectures from arch list
          sed -i '/^\s*- armhf$/d; /^\s*- i386$/d' prompts/config.yaml

          # Add image field if not already present
          if ! grep -q '^image:' prompts/config.yaml; then
            echo 'image: "ghcr.io/${{ github.repository_owner }}/home-assistant-apps-collection/{arch}-prompts"' \
              >> prompts/config.yaml
          fi

          # Sync optional display assets (ignore 404s)
          curl -sf "$BASE_URL/icon.png" -o prompts/icon.png  2>/dev/null || true
          curl -sf "$BASE_URL/logo.png" -o prompts/logo.png  2>/dev/null || true

      - name: Build and push prompts Docker images
        if: steps.prompts.outputs.needs_update == 'true'
        env:
          VERSION: ${{ steps.prompts.outputs.upstream }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}/home-assistant-apps-collection
        run: |
          git clone --depth 1 https://github.com/pajew-ski/prompts /tmp/prompts-source

          declare -A PLATFORM_MAP=(
            [amd64]=linux/amd64
            [aarch64]=linux/arm64
            [armv7]=linux/arm/v7
            [armhf]=linux/arm/v6
            [i386]=linux/386
          )

          for ARCH in amd64 aarch64 armv7; do
            BASE_IMAGE="ghcr.io/home-assistant/${ARCH}-base:latest"
            PLATFORM="${PLATFORM_MAP[$ARCH]}"
            IMAGE_TAG="${REGISTRY}/${ARCH}-prompts"

            echo "Building $IMAGE_TAG:$VERSION for $PLATFORM …"
            docker buildx build \
              --platform "$PLATFORM" \
              --build-arg BUILD_FROM="$BASE_IMAGE" \
              --tag "${IMAGE_TAG}:${VERSION}" \
              --tag "${IMAGE_TAG}:latest" \
              --push \
              /tmp/prompts-source
          done

      - name: Make prompts packages public
        if: ${{ github.event.inputs.addon == '' || github.event.inputs.addon == 'prompts' }}
        env:
          GH_TOKEN: ${{ secrets.PAT_PACKAGES || secrets.GITHUB_TOKEN }}
        run: |
          for ARCH in amd64 aarch64 armv7; do
            PACKAGE="home-assistant-apps-collection%2F${ARCH}-prompts"
            gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${PACKAGE}" \
              -f visibility=public \
              2>/dev/null \
              && echo "${ARCH}-prompts → public" \
              || echo "${ARCH}-prompts: visibility update skipped (may already be public or token lacks scope)"
          done

      - name: Commit and push changes
        if: steps.prompts.outputs.needs_update == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prompts/
          git diff --cached --quiet || \
            git commit -m "chore(prompts): sync to v${{ steps.prompts.outputs.upstream }}"
          git push

      # -----------------------------------------------------------------------
      # open-entrainer – https://github.com/pajew-ski/open-entrainer
      # -----------------------------------------------------------------------
      - name: Check open-entrainer for updates
        id: open_entrainer
        if: ${{ github.event.inputs.addon == '' || github.event.inputs.addon == 'open-entrainer' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/pajew-ski/open-entrainer/commits?path=index.html&per_page=1")

          UPSTREAM_VERSION=$(echo "$API_RESPONSE" | python3 -c \
            'import sys,json; d=json.load(sys.stdin)[0]["commit"]["committer"]["date"][:10].split("-"); print(d[0]+"."+str(int(d[1]))+"."+str(int(d[2])))')

          CURRENT_VERSION=$(grep '^version:' open-entrainer/config.yaml \
            | awk '{print $2}' | tr -d '"')

          echo "upstream=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT_VERSION"   >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_VERSION" != "$CURRENT_VERSION" ] \
             || [ "${{ inputs.force }}" = "true" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed: $CURRENT_VERSION → $UPSTREAM_VERSION"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Already up-to-date at $CURRENT_VERSION"
          fi

      - name: Build and push open-entrainer Docker images
        if: steps.open_entrainer.outputs.needs_update == 'true'
        env:
          VERSION: ${{ steps.open_entrainer.outputs.upstream }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}/home-assistant-apps-collection
        run: |
          export BUILD_DIR=$(mktemp -d)

          curl -sf \
            "https://raw.githubusercontent.com/pajew-ski/open-entrainer/main/index.html" \
            -o "$BUILD_DIR/index.html"

          python3 -c 'import os; open(os.environ["BUILD_DIR"]+"/Dockerfile","w").write("ARG BUILD_FROM\nFROM ${BUILD_FROM}\nRUN apk add --no-cache nginx\nRUN echo \"server { listen 8100; root /www; index index.html; }\" > /etc/nginx/http.d/default.conf\nCOPY index.html /www/index.html\nEXPOSE 8100\nENTRYPOINT []\nCMD [\"nginx\", \"-g\", \"daemon off;\"]\n")'

          declare -A PLATFORM_MAP=(
            [amd64]=linux/amd64
            [aarch64]=linux/arm64
            [armv7]=linux/arm/v7
          )

          for ARCH in amd64 aarch64 armv7; do
            BASE_IMAGE="ghcr.io/home-assistant/${ARCH}-base:latest"
            PLATFORM="${PLATFORM_MAP[$ARCH]}"
            IMAGE_TAG="${REGISTRY}/${ARCH}-open-entrainer"

            echo "Building $IMAGE_TAG:$VERSION for $PLATFORM …"
            docker buildx build \
              --platform "$PLATFORM" \
              --build-arg BUILD_FROM="$BASE_IMAGE" \
              --tag "${IMAGE_TAG}:${VERSION}" \
              --tag "${IMAGE_TAG}:latest" \
              --push \
              "$BUILD_DIR"
          done

          # Update version in config.yaml
          sed -i "s/^version:.*/version: \"$VERSION\"/" open-entrainer/config.yaml

      - name: Make open-entrainer packages public
        if: ${{ github.event.inputs.addon == '' || github.event.inputs.addon == 'open-entrainer' }}
        env:
          GH_TOKEN: ${{ secrets.PAT_PACKAGES || secrets.GITHUB_TOKEN }}
        run: |
          for ARCH in amd64 aarch64 armv7; do
            PACKAGE="home-assistant-apps-collection%2F${ARCH}-open-entrainer"
            gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${PACKAGE}" \
              -f visibility=public \
              2>/dev/null \
              && echo "${ARCH}-open-entrainer → public" \
              || echo "${ARCH}-open-entrainer: visibility update skipped (may already be public or token lacks scope)"
          done

      - name: Commit and push open-entrainer changes
        if: steps.open_entrainer.outputs.needs_update == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add open-entrainer/
          git diff --cached --quiet || \
            git commit -m "chore(open-entrainer): sync to v${{ steps.open_entrainer.outputs.upstream }}"
          git push

      # -----------------------------------------------------------------------
      # open-desensitizer – https://github.com/pajew-ski/open-desensitizer
      # -----------------------------------------------------------------------
      - name: Check open-desensitizer for updates
        id: open_desensitizer
        if: ${{ github.event.inputs.addon == '' || github.event.inputs.addon == 'open-desensitizer' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/pajew-ski/open-desensitizer/commits?path=index.html&per_page=1")

          UPSTREAM_VERSION=$(echo "$API_RESPONSE" | python3 -c \
            'import sys,json; d=json.load(sys.stdin)[0]["commit"]["committer"]["date"][:10].split("-"); print(d[0]+"."+str(int(d[1]))+"."+str(int(d[2])))')

          CURRENT_VERSION=$(grep '^version:' open-desensitizer/config.yaml \
            | awk '{print $2}' | tr -d '"')

          echo "upstream=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT_VERSION"   >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_VERSION" != "$CURRENT_VERSION" ] \
             || [ "${{ inputs.force }}" = "true" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed: $CURRENT_VERSION → $UPSTREAM_VERSION"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Already up-to-date at $CURRENT_VERSION"
          fi

      - name: Build and push open-desensitizer Docker images
        if: steps.open_desensitizer.outputs.needs_update == 'true'
        env:
          VERSION: ${{ steps.open_desensitizer.outputs.upstream }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}/home-assistant-apps-collection
        run: |
          export BUILD_DIR=$(mktemp -d)

          curl -sf \
            "https://raw.githubusercontent.com/pajew-ski/open-desensitizer/main/index.html" \
            -o "$BUILD_DIR/index.html"

          python3 -c 'import os; open(os.environ["BUILD_DIR"]+"/Dockerfile","w").write("ARG BUILD_FROM\nFROM ${BUILD_FROM}\nRUN apk add --no-cache nginx\nRUN echo \"server { listen 8101; root /www; index index.html; }\" > /etc/nginx/http.d/default.conf\nCOPY index.html /www/index.html\nEXPOSE 8101\nENTRYPOINT []\nCMD [\"nginx\", \"-g\", \"daemon off;\"]\n")'

          declare -A PLATFORM_MAP=(
            [amd64]=linux/amd64
            [aarch64]=linux/arm64
            [armv7]=linux/arm/v7
          )

          for ARCH in amd64 aarch64 armv7; do
            BASE_IMAGE="ghcr.io/home-assistant/${ARCH}-base:latest"
            PLATFORM="${PLATFORM_MAP[$ARCH]}"
            IMAGE_TAG="${REGISTRY}/${ARCH}-open-desensitizer"

            echo "Building $IMAGE_TAG:$VERSION for $PLATFORM …"
            docker buildx build \
              --platform "$PLATFORM" \
              --build-arg BUILD_FROM="$BASE_IMAGE" \
              --tag "${IMAGE_TAG}:${VERSION}" \
              --tag "${IMAGE_TAG}:latest" \
              --push \
              "$BUILD_DIR"
          done

          # Update version in config.yaml
          sed -i "s/^version:.*/version: \"$VERSION\"/" open-desensitizer/config.yaml

      - name: Make open-desensitizer packages public
        if: ${{ github.event.inputs.addon == '' || github.event.inputs.addon == 'open-desensitizer' }}
        env:
          GH_TOKEN: ${{ secrets.PAT_PACKAGES || secrets.GITHUB_TOKEN }}
        run: |
          for ARCH in amd64 aarch64 armv7; do
            PACKAGE="home-assistant-apps-collection%2F${ARCH}-open-desensitizer"
            gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${PACKAGE}" \
              -f visibility=public \
              2>/dev/null \
              && echo "${ARCH}-open-desensitizer → public" \
              || echo "${ARCH}-open-desensitizer: visibility update skipped (may already be public or token lacks scope)"
          done

      - name: Commit and push open-desensitizer changes
        if: steps.open_desensitizer.outputs.needs_update == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add open-desensitizer/
          git diff --cached --quiet || \
            git commit -m "chore(open-desensitizer): sync to v${{ steps.open_desensitizer.outputs.upstream }}"
          git push

      # -----------------------------------------------------------------------
      # oxigraph – https://github.com/oxigraph/oxigraph
      # -----------------------------------------------------------------------
      - name: Check oxigraph for updates
        id: oxigraph
        if: ${{ github.event.inputs.addon == '' || github.event.inputs.addon == 'oxigraph' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_VERSION=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/oxigraph/oxigraph/releases/latest" \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["tag_name"].lstrip("v"))')

          CURRENT_VERSION=$(grep '^version:' oxigraph/config.yaml \
            | awk '{print $2}' | tr -d '"')

          echo "upstream=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT_VERSION"   >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_VERSION" != "$CURRENT_VERSION" ] \
             || [ "${{ inputs.force }}" = "true" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed: $CURRENT_VERSION → $UPSTREAM_VERSION"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Already up-to-date at $CURRENT_VERSION"
          fi

      - name: Build and push oxigraph Docker images
        if: steps.oxigraph.outputs.needs_update == 'true'
        env:
          VERSION: ${{ steps.oxigraph.outputs.upstream }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}/home-assistant-apps-collection
        run: |
          export BUILD_DIR=$(mktemp -d)

          # Dockerfile wraps the official oxigraph image; ARG BUILD_FROM is
          # declared (satisfies docker buildx --build-arg) but the official
          # multi-arch image is used as the actual base.
          python3 -c 'import os; open(os.environ["BUILD_DIR"]+"/Dockerfile","w").write("ARG BUILD_FROM\nFROM ghcr.io/oxigraph/oxigraph:latest\nEXPOSE 7878\nCMD [\"serve\", \"--location\", \"/data\", \"--bind\", \"0.0.0.0:7878\"]\n")'

          declare -A PLATFORM_MAP=(
            [amd64]=linux/amd64
            [aarch64]=linux/arm64
          )

          for ARCH in amd64 aarch64; do
            BASE_IMAGE="ghcr.io/home-assistant/${ARCH}-base:latest"
            PLATFORM="${PLATFORM_MAP[$ARCH]}"
            IMAGE_TAG="${REGISTRY}/${ARCH}-oxigraph"

            echo "Building $IMAGE_TAG:$VERSION for $PLATFORM …"
            docker buildx build \
              --platform "$PLATFORM" \
              --build-arg BUILD_FROM="$BASE_IMAGE" \
              --tag "${IMAGE_TAG}:${VERSION}" \
              --tag "${IMAGE_TAG}:latest" \
              --push \
              "$BUILD_DIR"
          done

          # Update version in config.yaml
          sed -i "s/^version:.*/version: \"$VERSION\"/" oxigraph/config.yaml

      - name: Make oxigraph packages public
        if: ${{ github.event.inputs.addon == '' || github.event.inputs.addon == 'oxigraph' }}
        env:
          GH_TOKEN: ${{ secrets.PAT_PACKAGES || secrets.GITHUB_TOKEN }}
        run: |
          for ARCH in amd64 aarch64; do
            PACKAGE="home-assistant-apps-collection%2F${ARCH}-oxigraph"
            gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${PACKAGE}" \
              -f visibility=public \
              2>/dev/null \
              && echo "${ARCH}-oxigraph → public" \
              || echo "${ARCH}-oxigraph: visibility update skipped (may already be public or token lacks scope)"
          done

      - name: Commit and push oxigraph changes
        if: steps.oxigraph.outputs.needs_update == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oxigraph/
          git diff --cached --quiet || \
            git commit -m "chore(oxigraph): sync to v${{ steps.oxigraph.outputs.upstream }}"
          git push
