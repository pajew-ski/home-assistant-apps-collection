name: "Oxigraph"
description: >-
  SPARQL 1.1 triple store und RDF-Graphdatenbank mit YASGUI-Query-Interface.
  Sidebar-Zugriff immer aktiv. Externer Zugriff (Port 7878) optional –
  erst auth_type auf basic oder bearer setzen, dann network_access aktivieren.
  Oxigraph hat keinen eigenen Passwortschutz!
version: "0.5.5.1"
slug: oxigraph
url: "https://github.com/oxigraph/oxigraph"
arch:
    - amd64
    - aarch64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_entry: ""
panel_icon: "mdi:graph"
panel_title: "Oxigraph"
panel_admin: false
ports:
    7878/tcp: null
ports_description:
    7878/tcp: "SPARQL HTTP API – external (only active when network_access is enabled)"
map:
    - data:rw
options:
    network_access: false
    auth_type: "none"
    username: ""
    password: ""
    bearer_token: ""
schema:
    network_access: bool
    auth_type: list(none|basic|bearer)
    username: str
    password: str
    bearer_token: str
image: "ghcr.io/pajew-ski/home-assistant-apps-collection/{arch}-oxigraph"
